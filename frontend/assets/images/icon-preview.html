<!DOCTYPE html>
<html>
<head>
    <title>App Icon Options</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #00e676;
            margin-bottom: 40px;
        }
        .icons-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .icon-box {
            background: #0a0a0a;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #333;
        }
        .icon-box:hover {
            border-color: #00e676;
        }
        .icon-box img {
            width: 200px;
            height: 200px;
            border-radius: 40px;
        }
        .icon-label {
            margin-top: 16px;
            font-size: 18px;
            font-weight: bold;
        }
        .icon-desc {
            margin-top: 8px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🎨 Choose Your App Icon</h1>
    <div class="icons-container">
        <div class="icon-box">
            <img src="icon-option-a.png" alt="Option A">
            <div class="icon-label">Option A</div>
            <div class="icon-desc">Barcode + Checkmark</div>
        </div>
        <div class="icon-box">
            <img src="icon-option-b.png" alt="Option B">
            <div class="icon-label">Option B</div>
            <div class="icon-desc">Magnifying Glass + Apple</div>
        </div>
        <div class="icon-box">
            <img src="icon-option-c.png" alt="Option C">
            <div class="icon-label">Option C</div>
            <div class="icon-desc">Apple + Scan Line</div>
        </div>
        <div class="icon-box">
            <img src="icon-option-d.png" alt="Option D">
            <div class="icon-label">Option D</div>
            <div class="icon-desc">Text Logo</div>
        </div>
    </div>
</body>
</html>
